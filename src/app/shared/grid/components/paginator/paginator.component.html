<div class="paginator-container">
  <div class="page-size-section">
    <label for="pageSize">Page size:</label>
    <select id="pageSize" (change)="onPageSizeChange($event)">
      @for (size of pageSizeOptions(); track size) {
        <option [value]="size" [selected]="size === selectedPageSizeOption()">
          {{ size }}
        </option>
      }
    </select>
  </div>

  <div class="pagination-section">
    <button type="button" [disabled]="!canGoBack()" (click)="onGoBack()">
      Back
    </button>
    <span>{{ currentPage() }} / {{ totalPages() }}</span>
    <button type="button" [disabled]="!canGoForward()" (click)="onGoForward()">
      Forward
    </button>
  </div>
</div>
