<h2>No data table</h2>

<t-grid [data]="[]">
  <t-column [name]="'name'" [property]="'name'"></t-column>
  <t-column [name]="'language'" [property]="'language'"></t-column>
</t-grid>

<h2>Table with pagination</h2>

<t-grid
  [data]="countriesGridData()"
  [sortable]="true"
  [pageSize]="5"
  [gridDataLength]="countries.length"
  (paginationChange)="performFetch($event)"
  (sortChange)="performFetch($event)"
>
  <t-column [name]="'name'" [property]="'name'" [sortable]="true"></t-column>
  <t-column
    [name]="'population'"
    [property]="'population'"
    [sortable]="true"
  ></t-column>
  <t-column [name]="'currency'" [property]="'currency'"></t-column>
  <t-column [name]="'language'" [property]="'language'"></t-column>
</t-grid>
